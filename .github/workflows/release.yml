name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  FORCE_COLOR: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build:debug
        
      # macOS signing and notarization
      - name: Import Code-Signing Certificates (macOS)
        if: matrix.os == 'macos-latest'
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}
        continue-on-error: true
        
      - name: Build and publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run publish:mac
        
      - name: Build and publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish:win
        
      - name: Build and publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux && npx electron-builder --linux --publish=always

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create Release Notes
        id: release-notes
        run: |
          VERSION=${{ github.ref_name }}
          if [[ -z "$VERSION" ]]; then
            VERSION=${{ github.event.inputs.version }}
          fi
          
          echo "Creating release for version: $VERSION"
          
          # Create release notes (you can customize this)
          cat > release-notes.md << EOF
          ## ClipDesk $VERSION
          
          ### 🎉 What's New
          - Bug fixes and performance improvements
          - Enhanced clipboard monitoring
          - UI/UX improvements
          
          ### 📦 Downloads
          - **macOS**: Download the \`.dmg\` file for macOS 10.15+
          - **Windows**: Download the \`.exe\` installer for Windows 10+
          - **Linux**: Download the \`.AppImage\` for most Linux distributions
          
          ### 🔄 Auto-Updates
          This version includes automatic update checking. The app will notify you when new versions are available.
          
          ### 🐛 Bug Reports
          Found a bug? Please [open an issue](https://github.com/clipdesk/clipdesk/issues/new).
          EOF
          
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat release-notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          name: ClipDesk ${{ github.ref_name || github.event.inputs.version }}
          body: ${{ steps.release-notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 