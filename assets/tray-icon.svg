<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified clipboard for tray -->
  <rect x="16" y="12" width="32" height="44" rx="2" ry="2" fill="#2c2c2e" stroke="#8e8e93" stroke-width="1"/>
  
  <!-- Clipboard clip -->
  <rect x="26" y="8" width="12" height="6" rx="1" ry="1" fill="#007AFF" stroke="#0056CC" stroke-width="0.5"/>
  <rect x="28" y="9" width="8" height="4" rx="0.5" ry="0.5" fill="#ffffff"/>
  
  <!-- Paper -->
  <rect x="20" y="18" width="24" height="32" rx="1" ry="1" fill="#ffffff" stroke="#e1e5e9" stroke-width="0.5"/>
  
  <!-- Simple text lines -->
  <rect x="23" y="22" width="16" height="1.5" rx="0.5" fill="#007AFF"/>
  <rect x="23" y="26" width="18" height="1" rx="0.5" fill="#8e8e93"/>
  <rect x="23" y="29" width="14" height="1" rx="0.5" fill="#8e8e93"/>
  <rect x="23" y="32" width="17" height="1" rx="0.5" fill="#8e8e93"/>
  
  <!-- Simple bullets -->
  <circle cx="25" cy="37" r="1" fill="#34C759"/>
  <rect x="28" y="36" width="12" height="1" rx="0.5" fill="#8e8e93"/>
  
  <circle cx="25" cy="41" r="1" fill="#34C759"/>
  <rect x="28" y="40" width="10" height="1" rx="0.5" fill="#8e8e93"/>
</svg> 