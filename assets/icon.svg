<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clipboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F9FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="#0056CC" stroke-width="8"/>
  
  <!-- Clipboard base -->
  <rect x="140" y="120" width="232" height="320" rx="16" ry="16" fill="url(#clipboardGradient)" stroke="#E1E5E9" stroke-width="3"/>
  
  <!-- Clipboard clip -->
  <rect x="210" y="80" width="92" height="48" rx="8" ry="8" fill="#34C759" stroke="#30B654" stroke-width="2"/>
  <rect x="220" y="88" width="72" height="32" rx="4" ry="4" fill="#FFFFFF"/>
  
  <!-- Paper/Document -->
  <rect x="170" y="160" width="172" height="240" rx="8" ry="8" fill="url(#paperGradient)" stroke="#E1E5E9" stroke-width="2"/>
  
  <!-- Text lines on paper -->
  <rect x="190" y="190" width="120" height="4" rx="2" fill="#007AFF" opacity="0.8"/>
  <rect x="190" y="210" width="132" height="4" rx="2" fill="#8E8E93" opacity="0.6"/>
  <rect x="190" y="230" width="100" height="4" rx="2" fill="#8E8E93" opacity="0.6"/>
  <rect x="190" y="250" width="140" height="4" rx="2" fill="#8E8E93" opacity="0.6"/>
  
  <!-- Bullet points -->
  <circle cx="198" cy="280" r="3" fill="#34C759"/>
  <rect x="210" y="276" width="100" height="4" rx="2" fill="#8E8E93" opacity="0.6"/>
  
  <circle cx="198" cy="300" r="3" fill="#34C759"/>
  <rect x="210" y="296" width="85" height="4" rx="2" fill="#8E8E93" opacity="0.6"/>
  
  <circle cx="198" cy="320" r="3" fill="#34C759"/>
  <rect x="210" y="316" width="110" height="4" rx="2" fill="#8E8E93" opacity="0.6"/>
  
  <!-- Small highlight/accent -->
  <rect x="170" y="160" width="172" height="20" rx="8" fill="#007AFF" opacity="0.1"/>
</svg> 